<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bearing Traceability System</title>

    <link rel="stylesheet" href="style.css">

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- QR Code -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

</head>

<body>

<div class="container">

    <h1>BEARING TRACEABILITY SYSTEM</h1>

    <!-- Hidden search area (used only if no QR id is present) -->
    <div id="searchSection">

        <input
            type="text"
            id="serial"
            placeholder="Enter Serial Number">

        <button onclick="searchBearing()">
            Search
        </button>

    </div>

    <div id="result"></div>

    <div class="qrSection">

        <h2>QR Code</h2>

        <canvas id="qrcode"></canvas>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
