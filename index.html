<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bearing QR Traceability System</title>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- QR Code -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>


<style>

body{
    font-family: Arial;
    margin:30px;
    background:#f4f4f4;
}

.container{

    background:white;
    padding:25px;
    max-width:700px;
    border-radius:10px;

}


h1{
    color:#1f4e79;
}


input{

    width:300px;
    padding:10px;
    font-size:16px;

}


button{

    padding:10px 20px;
    background:#1f4e79;
    color:white;
    border:none;
    cursor:pointer;

}


table{

    margin-top:20px;
    width:100%;
    border-collapse:collapse;

}


td,th{

    border:1px solid #999;
    padding:10px;

}


th{

    background:#1f4e79;
    color:white;

}


#qrcode{

    margin-top:20px;

}

</style>


</head>


<body>


<div class="container">


<h1>Bearing QR Traceability System</h1>


<label>
Bearing Serial Number
</label>


<br><br>


<input id="serial" 
placeholder="Enter Serial Number">


<button onclick="searchBearing()">
Search
</button>


<div id="result"></div>


<h3>QR Code</h3>

<canvas id="qrcode"></canvas>


</div>


<script src="script.js" defer></script>


</body>

</html>
